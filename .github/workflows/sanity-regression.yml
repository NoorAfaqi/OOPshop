# Lightweight checks for the development branch.
# - Sanity: every push to `development`
# - Regression: pull requests from `development` → `main` / `master` (merge readiness)
#

name: Sanity / Regression

on:
  push:
    branches: [development]
  pull_request:
    branches: [main, master]

jobs:
  sanity:
    name: Sanity (development)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Backend — install & tests (single Node)
        working-directory: ./backend
        env:
          NODE_ENV: test
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          npm install
          npm test

      - name: Frontend — install & production build
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Android — unit tests only (no full check / JaCoCo)
        working-directory: ./app
        run: |
          chmod +x gradlew
          ./gradlew :app:testDebugUnitTest --no-daemon

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Recommendation — byte-compile (no pip install)
        run: python -m compileall -q recommendation/app

  regression:
    name: Regression (development → main)
    if: github.event_name == 'pull_request' && github.head_ref == 'development'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Backend — install & tests
        working-directory: ./backend
        env:
          NODE_ENV: test
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          npm install
          npm test

      - name: Frontend — install, test, build
        working-directory: ./frontend
        run: |
          npm ci
          npm test -- --ci --watchAll=false
          npm run build

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Android — unit tests + debug APK
        working-directory: ./app
        run: |
          chmod +x gradlew
          ./gradlew :app:testDebugUnitTest :app:assembleDebug --no-daemon

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: recommendation/requirements.txt

      - name: Recommendation — deps + smoke import
        working-directory: ./recommendation
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m compileall -q app
          python -c "from app.main import app; assert app.title"
