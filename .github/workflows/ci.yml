name: CI

# Continuous Integration workflow for OOPshop
# Runs tests, linting, and builds for both backend and frontend
# Tests on Node.js 18.x and 20.x for compatibility
#
# IMPORTANT: To prevent Render from deploying when CI fails:
# 1. Go to GitHub repo Settings > Branches > Add rule
# 2. Set branch name pattern (e.g., main, master)
# 3. Enable "Require status checks to pass before merging"
# 4. Select "CI" workflow
# 5. Enable "Require branches to be up to date before merging"
# 6. In Render dashboard, configure auto-deploy to wait for GitHub status checks
#    (if supported) or disable auto-deploy and deploy manually after CI passes

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    # Note: Database connection uses remote Hostinger database
    # Configure these secrets in GitHub: Settings > Secrets and variables > Actions
    # Required secrets: DB_HOST, DB_PORT, DB_USER, DB_PASSWORD, DB_NAME, JWT_SECRET
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install
      
      - name: Run backend tests
        working-directory: ./backend
        env:
          NODE_ENV: test
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: npm test
      
      - name: Run backend tests with coverage
        working-directory: ./backend
        env:
          NODE_ENV: test
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: npm run test:coverage

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint . || true
      
      - name: Run frontend tests
        working-directory: ./frontend
        run: npm test -- --ci --coverage --watchAll=false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install
      
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
      
      - name: Check backend can start
        working-directory: ./backend
        env:
          NODE_ENV: production
          PORT: 5000
        run: |
          timeout 10s npm start || true
      
      - name: CI Status - Ready for Deployment
        if: success()
        run: |
          echo "✅ All CI checks passed. Ready for deployment."
          echo "If using Render, ensure it's configured to wait for GitHub status checks."
