name: CI

# Continuous Integration workflow for OOPshop
# Runs tests, linting, and builds for backend, frontend, Android app, and recommendation service
# Tests on Node.js 18.x and 20.x for compatibility
#
# IMPORTANT: To prevent Render from deploying when CI fails:
#
# GitHub Branch Protection (Already configured):
# 1. Go to GitHub repo Settings > Branches > Add rule
# 2. Set branch name pattern (e.g., main, master)
# 3. Enable "Require status checks to pass before merging"
# 4. Select required status checks: "backend-tests", "frontend-tests", "android-check",
#    "recommendation-check", "build"
# 5. Enable "Require branches to be up to date before merging"
#
# Render Configuration (Required to stop CD on CI failure):
# 1. Go to Render dashboard > Your Service > Settings
# 2. Scroll to "Auto-Deploy" section
# 3. Enable "Wait for CI" or "Wait for GitHub status checks"
# 4. This will prevent deployment until all required status checks pass
#
# Alternative: If Render doesn't support waiting for status checks:
# - Disable auto-deploy in Render
# - Deploy manually only after CI passes

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    # Note: Database connection uses remote Hostinger database
    # Configure these secrets in GitHub: Settings > Secrets and variables > Actions
    # Required secrets: DB_HOST, DB_PORT, DB_USER, DB_PASSWORD, DB_NAME, JWT_SECRET

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Run backend tests
        working-directory: ./backend
        env:
          NODE_ENV: test
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: npm test

      - name: Run backend tests with coverage
        working-directory: ./backend
        env:
          NODE_ENV: test
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: npm run test

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint . || true

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm test -- --ci --coverage --watchAll=false

  android-check:
    name: Android (Gradle)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Gradle wrapper permission
        working-directory: ./app
        run: chmod +x gradlew

      - name: Gradle build cache
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle check + JaCoCo (unit tests, lint, coverage report)
        working-directory: ./app
        run: ./gradlew check jacocoTestReport --no-daemon

      - name: Assemble debug APK
        working-directory: ./app
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: oopshop-app-debug-${{ github.sha }}
          path: app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

  recommendation-check:
    name: Recommendation (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: recommendation/requirements.txt

      - name: Install dependencies
        working-directory: ./recommendation
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import FastAPI app (smoke)
        working-directory: ./recommendation
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
        run: python -c "from app.main import app; assert app.title"

      - name: Byte-compile package
        working-directory: ./recommendation
        run: python -m compileall -q app

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, android-check, recommendation-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Check backend can start
        working-directory: ./backend
        env:
          NODE_ENV: production
          PORT: 5000
        run: |
          timeout 10s npm start || true

      - name: CI Status - Ready for Deployment
        if: success()
        run: |
          echo "✅ All CI checks passed. Ready for deployment."
          echo "If using Render, ensure it's configured to wait for GitHub status checks."
