# Docker Compose configuration for using a REMOTE database
# Usage: docker compose -f docker-compose.remote-db.yml up

services:
  # Backend API (no local MySQL - connects to remote database)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: oopshop-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      # Remote database configuration - set these in .env file
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_CONNECTION_LIMIT: ${DB_CONNECTION_LIMIT:-10}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      # Skip migrations for remote database (it already has schema)
      SKIP_MIGRATIONS: ${SKIP_MIGRATIONS:-true}
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_logs:/app/logs
    networks:
      - oopshop-network
    # Add extra_hosts for remote database access if needed
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Frontend Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: oopshop-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - oopshop-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  oopshop-network:
    driver: bridge

volumes:
  backend_logs:
    driver: local
  frontend_node_modules:
    driver: local

